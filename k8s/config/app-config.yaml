apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-orchestrator
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:password@postgres:5432/tasks_db"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  GROQ_API_KEY: "your_groq_api_key_here"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-orchestrator
data:
  GROQ_MODEL: "llama-3.3-70b-versatile"
  SIMULATE_AI_FAILURE: "false"
  WORKER_HEARTBEAT_TTL_SECONDS: "30"
  CELERY_QUEUE_NAME: "celery"
  K8S_NAMESPACE: "ai-orchestrator"
  WORKER_DEPLOYMENT_NAME: "worker"
  WORKER_MIN_REPLICAS: "1"
  WORKER_MAX_REPLICAS: "10"
