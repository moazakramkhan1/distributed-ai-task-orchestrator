apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/moazakramkhan1/distributed-ai-task-orchestrator-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.worker.celery_app
            - worker
            - --loglevel=info
            - --concurrency=2
            - --heartbeat-interval=15
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          env:
            - name: PYTHONPATH
              value: /app
