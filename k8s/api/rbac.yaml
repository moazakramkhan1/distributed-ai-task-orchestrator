apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: ai-orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-reader
  namespace: ai-orchestrator
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-reads-deployments
  namespace: ai-orchestrator
subjects:
  - kind: ServiceAccount
    name: api-sa
    namespace: ai-orchestrator
roleRef:
  kind: Role
  name: deployment-reader
  apiGroup: rbac.authorization.k8s.io
