apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api-sa
      containers:
        - name: api
          image: ghcr.io/YOUR_GITHUB_OWNER/YOUR_REPO_NAME-api:latest
          imagePullPolicy: Always
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          env:
            - name: PYTHONPATH
              value: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ai-orchestrator
spec:
  selector:
    app: api
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
